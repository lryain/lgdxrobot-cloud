services:
  postgres:
    image: postgres:18
    ports:
      - 5432:5432
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: LGDXRobotCloud
    volumes:
      - pgdata:/var/lib/postgresql

  rabbitmq:
    image: rabbitmq:4
    ports:
      - 5672:5672
      - 15672:15672
    restart: always

  redis:
    image: redis:8
    ports:
      - 6379:6379
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./data/certs/rootCA.crt:/certs/rootCA.crt
      - ./data/certs/redis_server.crt:/certs/redis_server.crt
      - ./data/certs/redis_server.key:/certs/redis_server.key

  api:
    image: lgdxrobot/lgdxrobotcloud-api
    ports:
      - 5162:5162
      - 5163:5163
    restart: always
    environment:
      ASPNETCORE_Kestrel__Certificates__Default__Password: ""
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/App/app.pfx"
    volumes:
      - ./data/configs/appsettings.api.json:/App/appsettings.json
      - ./data/certs/grpc.pfx:/App/grpc.pfx
      - ./data/certs/app.pfx:/App/app.pfx
      - ./data/certs/rootCA.crt:/etc/ssl/certs/rootCA.crt
      - ./data/certs/rootCA.pfx:/root/.dotnet/corefx/cryptography/x509stores/my/rootCA.pfx
      - ./data/certs/redis_client.pfx:/root/.dotnet/corefx/cryptography/x509stores/my/redis_client.pfx
    depends_on:
      - postgres
      - rabbitmq
      - redis

  ui:
    image: lgdxrobot/lgdxrobotcloud-ui
    ports:
      - 5102:5102
      - 5103:5103
    restart: always
    environment:
      ASPNETCORE_Kestrel__Certificates__Default__Password: ""
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/App/app.pfx"
    volumes:
      - ./data/configs/appsettings.ui.json:/App/appsettings.json
      - ./data/certs/ui.pfx:/root/.dotnet/corefx/cryptography/x509stores/my/ui.pfx
      - ./data/certs/redis_client.pfx:/root/.dotnet/corefx/cryptography/x509stores/my/redis_client.pfx
      - ./data/certs/app.pfx:/App/app.pfx
      - ./data/certs/rootCA.crt:/etc/ssl/certs/rootCA.crt
    depends_on:
      - api
      - rabbitmq
      - redis

  worker:
    image: lgdxrobot/lgdxrobotcloud-worker
    restart: always
    volumes:
      - ./data/configs/appsettings.worker.json:/App/appsettings.json
    depends_on:
      - api
      - postgres
      - rabbitmq

  data:
    image: lgdxrobot/lgdxrobotcloud-data
    restart: "no"
    volumes:
      - ./appsettings.data.json:/App/appsettings.json
      - ./data:/App/data
    depends_on:
      - postgres

volumes:
  pgdata: