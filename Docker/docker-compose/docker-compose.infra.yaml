
# LGDXRobot Cloud - 本地开发基础设施服务
# 仅包含 PostgreSQL + RabbitMQ + Redis，不含应用服务
services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: LGDXRobotCloud
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d LGDXRobotCloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./certs/rootCA.crt:/certs/rootCA.crt
      - ./certs/redis_server.crt:/certs/redis_server.crt
      - ./certs/redis_server.key:/certs/redis_server.key
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
